version: "3.8"

services:
  sdf-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdf-dashboard
    ports:
      - "3000:3000"
    volumes:
      # Persistent volume for SQLite database
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      # Add your environment variables here or use .env file
      # - SUPABASE_URL=
      # - SUPABASE_ANON_KEY=
      # - STRIPE_SECRET_KEY=
      # - STRIPE_PUBLISHABLE_KEY=
      # - RESEND_API_KEY=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/doctors"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
