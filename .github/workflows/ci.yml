name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: npm run lint --if-present
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Notify n8n on failure
        if: failure()
        run: |
          curl -fsS -X POST "${{ secrets.N8N_WEBHOOK_FAIL }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\",\"run_id\":\"${{ github.run_id }}\"}" || true
