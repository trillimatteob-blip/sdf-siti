version: "3.8"

services:
  sdf-dashboard:
    image: ghcr.io/trillimatteob-blip/sdf-siti:latest
    container_name: sdf-dashboard
    ports:
      - "3000:3000"
    volumes:
      # Persistent volume for SQLite database
      - ./data:/app/data
      # Mount .env file for secrets (create this manually on the VPS)
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/doctors"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
